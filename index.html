<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life Score</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Score">
<meta name="theme-color" content="#FAFAF7">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --ink: #1C1C1A;
    --ink-soft: #6E6E66;
    --line: #E4E2DA;
    --accent: #2F6F5E;
    --accent-soft: #E4EFEA;
    --rust: #B5483C;
    --rust-soft: #F6E8E5;
    --gold: #A9822E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width: 480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    background: var(--bg);
  }
  header.top{
    padding: 22px 20px 14px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--bg); z-index:5;
  }
  header.top .wordmark{
    font-family:'Newsreader', serif;
    font-size:22px;
    font-weight:500;
    letter-spacing:0.2px;
  }
  header.top .date{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  main{
    flex:1;
    padding: 18px 20px 100px;
    overflow-y:auto;
  }
  .section-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin: 22px 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .section-label:first-child{margin-top:4px;}
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .item-name{
    font-size:15px;
    font-weight:500;
  }
  .item-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:3px;
  }
  .pill{
    font-family:'Newsreader', serif;
    font-size:15px;
    font-weight:500;
    padding: 4px 10px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent);
    white-space:nowrap;
  }
  .pill.negative{
    background:var(--rust-soft);
    color:var(--rust);
  }
  .pill.neutral{
    background:#F0EFE9;
    color:var(--ink-soft);
  }
  button{
    font-family:inherit;
    border:none;
    cursor:pointer;
    background:none;
  }
  .btn-done{
    width:38px; height:38px;
    border-radius:50%;
    border:1.5px solid var(--accent);
    color:var(--accent);
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition: all .15s ease;
  }
  .btn-done.done{
    background:var(--accent);
    color:#fff;
  }
  .btn-done:active{ transform: scale(0.92); }
  .btn-complete-task{
    border:1px solid var(--line);
    border-radius:10px;
    padding:7px 12px;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    background:var(--paper);
    flex-shrink:0;
  }
  .btn-complete-task:active{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
  .fab{
    position:fixed;
    bottom: 86px;
    right: calc(50% - 240px + 20px);
    width:52px; height:52px;
    border-radius:50%;
    background:var(--ink);
    color:#fff;
    font-size:26px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.18);
    z-index:8;
  }
  @media (max-width:480px){
    .fab{ right:20px; }
  }
  nav.tabs{
    position:fixed;
    bottom:0;
    width:100%;
    max-width:480px;
    background:var(--paper);
    border-top:1px solid var(--line);
    display:flex;
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:10;
  }
  nav.tabs button{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 0;
    font-size:11px;
    color:var(--ink-soft);
    border-radius:10px;
  }
  nav.tabs button.active{ color:var(--accent); }
  nav.tabs svg{ width:20px; height:20px; }

  .score-hero{
    text-align:center;
    padding: 18px 0 6px;
  }
  .score-hero .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color:var(--ink-soft);
  }
  .score-hero .number{
    font-family:'Newsreader', serif;
    font-size:64px;
    line-height:1;
    font-weight:500;
    margin-top:6px;
  }
  .score-hero .number.negative{ color:var(--rust); }
  .score-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    margin-top:18px;
  }
  .score-tile{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
  }
  .score-tile .t-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
  }
  .score-tile .t-value{
    font-family:'Newsreader', serif;
    font-size:28px;
    margin-top:4px;
  }
  .score-tile .t-value.negative{ color:var(--rust); }

  .empty{
    text-align:center;
    padding: 40px 10px;
    color:var(--ink-soft);
    font-size:14px;
  }
  .empty .big{
    font-size:30px;
    margin-bottom:8px;
  }

  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(28,28,26,0.4);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:20;
  }
  .modal{
    background:var(--paper);
    width:100%;
    max-width:480px;
    border-radius:20px 20px 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom));
    animation: slideup .18s ease;
  }
  @keyframes slideup{ from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .modal h3{
    font-family:'Newsreader', serif;
    font-weight:500;
    font-size:20px;
    margin:0 0 16px;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  .field input, .field select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    font-family:inherit;
    background:var(--bg);
    color:var(--ink);
  }
  .modal-actions{
    display:flex; gap:10px; margin-top:18px;
  }
  .btn-primary{
    flex:1;
    background:var(--ink);
    color:#fff;
    padding:13px;
    border-radius:12px;
    font-size:15px;
    font-weight:500;
  }
  .btn-secondary{
    flex:1;
    background:var(--bg);
    border:1px solid var(--line);
    padding:13px;
    border-radius:12px;
    font-size:15px;
    color:var(--ink-soft);
  }
  .btn-danger{
    background:var(--rust);
    color:#fff;
  }
  .swipe-del{
    color:var(--rust-soft);
    background:var(--rust);
  }
  .toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:30px;
    font-size:13px;
    z-index:30;
    opacity:0;
    transition:opacity .2s ease;
    pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; }
  .reset-zone{
    margin-top:30px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }
  .reset-zone p{
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
    margin-bottom:12px;
  }
  .link-danger{
    color:var(--rust);
    font-size:14px;
    font-weight:500;
    text-decoration:underline;
  }
  .loading-msg{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:13px;
  }
  .streak-flame{ font-size:12px; }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="wordmark">Life Score</div>
    <div class="date" id="todayLabel"></div>
  </header>
  <main id="main">
    <div class="loading-msg">Loading your data…</div>
  </main>
  <div class="fab" id="fab" style="display:none;">+</div>
  <nav class="tabs">
    <button data-tab="today" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Today
    </button>
    <button data-tab="habits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg>
      Habits
    </button>
    <button data-tab="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Tasks
    </button>
    <button data-tab="score">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      Score
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const STORE_KEY = 'lifescore_state_v1';
let state = { habits: [], tasks: [], log: [] };
let currentTab = 'today';
let storageReady = false;

function todayStr(d=new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysBetween(a,b){
  const A = new Date(a+'T00:00:00'), B = new Date(b+'T00:00:00');
  return Math.round((B-A)/86400000);
}
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return todayStr(d);
}
function fmtDateLabel(){
  const opts = {weekday:'long', month:'long', day:'numeric'};
  document.getElementById('todayLabel').textContent = new Date().toLocaleDateString(undefined, opts);
}
function uid(){ return Math.random().toString(36).slice(2,9); }

async function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ state = JSON.parse(raw); }
  }catch(e){ /* no existing data yet, or storage unavailable */ }
  storageReady = true;
}
async function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('Save failed', e);
    showToast('Could not save — try again');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove('show'), 1800);
}

// ---------- Habit logic ----------
function habitDisplayStreak(h){
  const t = todayStr();
  if(!h.lastCompletedDate) return 0;
  const gap = daysBetween(h.lastCompletedDate, t);
  if(gap === 0) return h.streak;
  if(gap === 1) return h.streak;
  return 0;
}
function habitDoneToday(h){
  return h.lastCompletedDate === todayStr();
}
function habitReward(streakAfter, base){
  const bonus = Math.floor(streakAfter/5)*Math.max(1, Math.round(base*0.1));
  return base + bonus;
}
function completeHabit(id){
  const h = state.habits.find(x=>x.id===id);
  if(!h || habitDoneToday(h)) return;
  const t = todayStr();
  let newStreak;
  if(h.lastCompletedDate === addDays(t,-1)){
    newStreak = h.streak + 1;
  } else {
    newStreak = 1;
  }
  h.streak = newStreak;
  h.lastCompletedDate = t;
  const pts = habitReward(newStreak, h.basePoints);
  state.log.push({id: uid(), kind:'habit', refId: h.id, name: h.name, points: pts, date: t});
  saveState();
  renderMain();
  showToast(`+${pts} · ${h.name}`);
}
function uncompleteHabit(id){
  const h = state.habits.find(x=>x.id===id);
  if(!h || !habitDoneToday(h)) return;
  const t = todayStr();
  // remove today's log entry, roll back streak
  const idx = state.log.findIndex(l=> l.kind==='habit' && l.refId===id && l.date===t);
  if(idx>-1) state.log.splice(idx,1);
  h.streak = Math.max(0, h.streak - 1);
  h.lastCompletedDate = h.streak > 0 ? addDays(t,-1) : null;
  saveState();
  renderMain();
}

// ---------- Task logic ----------
function taskCurrentValue(task){
  const days = daysBetween(task.createdDate, todayStr());
  return Math.round(task.startValue - task.decayRate*days);
}
function completeTask(id){
  const idx = state.tasks.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const task = state.tasks[idx];
  const val = taskCurrentValue(task);
  state.log.push({id: uid(), kind:'task', refId: task.id, name: task.name, points: val, date: todayStr()});
  state.tasks.splice(idx,1);
  saveState();
  renderMain();
  showToast(`${val>=0?'+':''}${val} · ${task.name} done`);
}
function deleteTask(id){
  state.tasks = state.tasks.filter(t=>t.id!==id);
  saveState();
  renderMain();
}
function deleteHabit(id){
  state.habits = state.habits.filter(h=>h.id!==id);
  state.log = state.log.filter(l=> !(l.kind==='habit' && l.refId===id));
  saveState();
  renderMain();
}

// ---------- Scores ----------
function startOfWeek(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay(); // 0 Sun
  const diff = (day===0?-6:1-day); // Monday start
  d.setDate(d.getDate()+diff);
  return todayStr(d);
}
function scoreForRange(filterFn){
  return state.log.filter(filterFn).reduce((sum,l)=>sum+l.points,0);
}
function getScores(){
  const t = todayStr();
  const weekStart = startOfWeek(t);
  const monthPrefix = t.slice(0,7);
  const daily = scoreForRange(l=>l.date===t);
  const weekly = scoreForRange(l=> l.date>=weekStart && l.date<=t);
  const monthly = scoreForRange(l=> l.date.slice(0,7)===monthPrefix);
  const allTime = scoreForRange(()=>true);
  return {daily, weekly, monthly, allTime};
}

// ---------- Rendering ----------
function renderMain(){
  const main = document.getElementById('main');
  document.getElementById('fab').style.display = (currentTab==='habits'||currentTab==='tasks') ? 'flex' : 'none';
  if(currentTab==='today') return renderToday(main);
  if(currentTab==='habits') return renderHabits(main);
  if(currentTab==='tasks') return renderTasks(main);
  if(currentTab==='score') return renderScore(main);
}

function renderToday(main){
  const t = todayStr();
  const todays = state.log.filter(l=>l.date===t);
  const total = todays.reduce((s,l)=>s+l.points,0);
  let html = `
    <div class="score-hero">
      <div class="label">Today's score</div>
      <div class="number ${total<0?'negative':''}">${total>0?'+':''}${total}</div>
    </div>
    <div class="section-label">Habits</div>`;
  if(state.habits.length===0){
    html += `<div class="card" style="text-align:center; color:var(--ink-soft); font-size:13px;">No habits yet. Add one from the Habits tab.</div>`;
  } else {
    state.habits.forEach(h=>{
      const done = habitDoneToday(h);
      const streak = habitDisplayStreak(h);
      html += `
      <div class="card row">
        <div>
          <div class="item-name">${escapeHtml(h.name)}</div>
          <div class="item-sub">${streak>0? `${streak} day streak` : 'No streak yet'} · ${h.basePoints} pt base</div>
        </div>
        <button class="btn-done ${done?'done':''}" data-habit="${h.id}">${done? '✓' : ''}</button>
      </div>`;
    });
  }
  html += `<div class="section-label">Open tasks</div>`;
  if(state.tasks.length===0){
    html += `<div class="card" style="text-align:center; color:var(--ink-soft); font-size:13px;">No open tasks. Nice.</div>`;
  } else {
    state.tasks.slice().sort((a,b)=>taskCurrentValue(a)-taskCurrentValue(b)).slice(0,4).forEach(task=>{
      const val = taskCurrentValue(task);
      html += `
      <div class="card row">
        <div>
          <div class="item-name">${escapeHtml(task.name)}</div>
          <div class="item-sub">decaying ${task.decayRate}/day</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="pill ${val<0?'negative':''}">${val>=0?'+':''}${val}</span>
        </div>
      </div>`;
    });
  }
  main.innerHTML = html;
  main.querySelectorAll('[data-habit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.habit;
      const h = state.habits.find(x=>x.id===id);
      if(habitDoneToday(h)) uncompleteHabit(id); else completeHabit(id);
    });
  });
}

function renderHabits(main){
  let html = `<div class="section-label">Your habits</div>`;
  if(state.habits.length===0){
    html += `<div class="empty"><div class="big">🪴</div>Nothing here yet.<br>Tap + to add your first habit.</div>`;
  } else {
    state.habits.forEach(h=>{
      const done = habitDoneToday(h);
      const streak = habitDisplayStreak(h);
      html += `
      <div class="card">
        <div class="row">
          <div>
            <div class="item-name">${escapeHtml(h.name)}</div>
            <div class="item-sub">${streak>0? `🔥 ${streak} day streak` : 'No streak yet'} · base ${h.basePoints} pts</div>
          </div>
          <button class="btn-done ${done?'done':''}" data-habit="${h.id}">${done? '✓' : ''}</button>
        </div>
        <div style="text-align:right; margin-top:8px;">
          <button class="link-danger" style="font-size:12px;" data-del-habit="${h.id}">Remove</button>
        </div>
      </div>`;
    });
  }
  main.innerHTML = html;
  main.querySelectorAll('[data-habit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.habit;
      const h = state.habits.find(x=>x.id===id);
      if(habitDoneToday(h)) uncompleteHabit(id); else completeHabit(id);
    });
  });
  main.querySelectorAll('[data-del-habit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(confirm('Remove this habit? Its streak history will be lost.')) deleteHabit(btn.dataset.delHabit);
    });
  });
}

function renderTasks(main){
  let html = `<div class="section-label">Open tasks</div>`;
  if(state.tasks.length===0){
    html += `<div class="empty"><div class="big">📋</div>Nothing pending.<br>Tap + to add a task.</div>`;
  } else {
    state.tasks.slice().sort((a,b)=>taskCurrentValue(a)-taskCurrentValue(b)).forEach(task=>{
      const val = taskCurrentValue(task);
      const days = daysBetween(task.createdDate, todayStr());
      html += `
      <div class="card">
        <div class="row">
          <div>
            <div class="item-name">${escapeHtml(task.name)}</div>
            <div class="item-sub">${days===0?'added today':`added ${days} day${days===1?'':'s'} ago`} · decays ${task.decayRate}/day</div>
          </div>
          <span class="pill ${val<0?'negative':''}">${val>=0?'+':''}${val}</span>
        </div>
        <div class="row" style="margin-top:10px;">
          <button class="link-danger" style="font-size:12px;" data-del-task="${task.id}">Remove</button>
          <button class="btn-complete-task" data-complete-task="${task.id}">Mark done</button>
        </div>
      </div>`;
    });
  }
  main.innerHTML = html;
  main.querySelectorAll('[data-complete-task]').forEach(btn=>{
    btn.addEventListener('click', ()=> completeTask(btn.dataset.completeTask));
  });
  main.querySelectorAll('[data-del-task]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(confirm('Remove this task without earning or losing points for it?')) deleteTask(btn.dataset.delTask);
    });
  });
}

function renderScore(main){
  const s = getScores();
  let html = `
    <div class="score-hero">
      <div class="label">All-time score</div>
      <div class="number ${s.allTime<0?'negative':''}">${s.allTime>0?'+':''}${s.allTime}</div>
    </div>
    <div class="score-grid">
      <div class="score-tile">
        <div class="t-label">Today</div>
        <div class="t-value ${s.daily<0?'negative':''}">${s.daily>0?'+':''}${s.daily}</div>
      </div>
      <div class="score-tile">
        <div class="t-label">This week</div>
        <div class="t-value ${s.weekly<0?'negative':''}">${s.weekly>0?'+':''}${s.weekly}</div>
      </div>
      <div class="score-tile">
        <div class="t-label">This month</div>
        <div class="t-value ${s.monthly<0?'negative':''}">${s.monthly>0?'+':''}${s.monthly}</div>
      </div>
      <div class="score-tile">
        <div class="t-label">Habits tracked</div>
        <div class="t-value">${state.habits.length}</div>
      </div>
    </div>
    <div class="reset-zone">
      <p>A full reset clears every habit, task, and score permanently. The app will keep working exactly the same way afterward — nothing about the rules changes, this just gives you a fresh start.</p>
      <button class="link-danger" id="resetBtn">Reset everything</button>
    </div>
  `;
  main.innerHTML = html;
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    openResetModal();
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------- Modals ----------
function openModal(html){
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(wrap);
  wrap.addEventListener('click', (e)=>{ if(e.target===wrap) wrap.remove(); });
  return wrap;
}

function openAddHabitModal(){
  const m = openModal(`
    <h3>New habit</h3>
    <div class="field"><label>Name</label><input id="hName" type="text" placeholder="e.g. Brush teeth" /></div>
    <div class="field"><label>Base points (difficulty)</label><input id="hPoints" type="number" value="10" min="1" /></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="hCancel">Cancel</button>
      <button class="btn-primary" id="hSave">Add habit</button>
    </div>
  `);
  m.querySelector('#hCancel').addEventListener('click', ()=>m.remove());
  m.querySelector('#hSave').addEventListener('click', ()=>{
    const name = m.querySelector('#hName').value.trim();
    const pts = parseInt(m.querySelector('#hPoints').value)||10;
    if(!name){ showToast('Give it a name'); return; }
    state.habits.push({id: uid(), name, basePoints: pts, streak:0, lastCompletedDate:null});
    saveState();
    m.remove();
    renderMain();
  });
  setTimeout(()=>m.querySelector('#hName').focus(), 100);
}

function openAddTaskModal(){
  const m = openModal(`
    <h3>New task</h3>
    <div class="field"><label>Name</label><input id="tName" type="text" placeholder="e.g. Call dentist" /></div>
    <div class="field"><label>Starting value</label><input id="tStart" type="number" value="50" /></div>
    <div class="field"><label>Decay per day</label><input id="tDecay" type="number" value="5" min="0" /></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="tCancel">Cancel</button>
      <button class="btn-primary" id="tSave">Add task</button>
    </div>
  `);
  m.querySelector('#tCancel').addEventListener('click', ()=>m.remove());
  m.querySelector('#tSave').addEventListener('click', ()=>{
    const name = m.querySelector('#tName').value.trim();
    const start = parseFloat(m.querySelector('#tStart').value)||0;
    const decay = parseFloat(m.querySelector('#tDecay').value)||0;
    if(!name){ showToast('Give it a name'); return; }
    state.tasks.push({id: uid(), name, startValue: start, decayRate: decay, createdDate: todayStr()});
    saveState();
    m.remove();
    renderMain();
  });
  setTimeout(()=>m.querySelector('#tName').focus(), 100);
}

function openResetModal(){
  const m = openModal(`
    <h3>Reset everything?</h3>
    <div class="field" style="color:var(--ink-soft); font-size:14px; line-height:1.5;">
      This permanently deletes all habits, tasks, and score history. This can't be undone.
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="rCancel">Cancel</button>
      <button class="btn-primary btn-danger" id="rConfirm">Reset everything</button>
    </div>
  `);
  m.querySelector('#rCancel').addEventListener('click', ()=>m.remove());
  m.querySelector('#rConfirm').addEventListener('click', async ()=>{
    state = {habits:[], tasks:[], log:[]};
    await saveState();
    m.remove();
    renderMain();
    showToast('Everything reset');
  });
}

// ---------- Init ----------
function setTab(tab){
  currentTab = tab;
  document.querySelectorAll('nav.tabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  renderMain();
}
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.addEventListener('click', ()=> setTab(b.dataset.tab));
});
document.getElementById('fab').addEventListener('click', ()=>{
  if(currentTab==='habits') openAddHabitModal();
  if(currentTab==='tasks') openAddTaskModal();
});

(async function init(){
  fmtDateLabel();
  await loadState();
  setTab('today');
  if('serviceWorker' in navigator){
    try{
      await navigator.serviceWorker.register('./service-worker.js');
    }catch(e){
      console.warn('Service worker registration failed', e);
    }
  }
})();
</script>
</body>
</html>
